[variables]
COREPACK_INTEGRITY_KEYS = "0"

[phases.setup]
nixPkgs = ["nodejs_20"]
cmds = ["corepack enable && corepack prepare pnpm@9.15.9 --activate"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/api-server run build",
  "BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/luffy-shop run build"
]

[start]
cmd = "sh scripts/start.sh"
